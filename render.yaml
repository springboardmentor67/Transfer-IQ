services:
  - type: web
    name: transferiq-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python train_pipeline.py
    startCommand: cd api && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: CORS_ORIGINS
        value: "*"
      - key: CACHE_TTL
        value: "300"
